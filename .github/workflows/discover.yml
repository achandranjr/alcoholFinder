name: Discovery

# Fan-out / fan-in discovery. Instead of one job running every source in series,
# a `plan` job resolves the enabled source list, a `gather` matrix runs each
# source as its own PARALLEL job (writing only its own candidates), and a single
# `aggregate` overseer then de-dupes across all sources and does the one DB write.
#
# Triggered on a schedule (all sources, live) and via workflow_dispatch — the
# dashboard's per-source "Run" buttons hit the GitHub API to dispatch this with a
# specific `source` + `run_id`, so a custom DB-added source is runnable too.

on:
  schedule:
    # GitHub Actions cron is UTC and ignores DST. Set for US Central DAYLIGHT
    # time (CDT, UTC-5) = 8 AM / 8 PM CT. In November (CST, UTC-6) shift both an
    # hour later: '0 14 * * *' and '0 2 * * *'.
    - cron: '0 13 * * *'   # 8 AM CT
    - cron: '0 1 * * *'    # 8 PM CT
  workflow_dispatch:
    inputs:
      source:
        description: 'Source id to run, or "all"'
        default: 'all'
      mode:
        description: 'live (writes new products) or test (dry-run)'
        default: 'live'
      run_id:
        description: 'Existing run row to attach to (set by the dashboard; leave blank to create one)'
        default: ''

# Scope concurrency per run so a manual single-source run never blocks the
# scheduled all-sources run (or vice versa).
concurrency:
  group: discovery-${{ github.event.inputs.run_id || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  # Optional — a source whose key is missing is simply not "enabled", so `plan`
  # leaves it out of the matrix.
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  COLACLOUD_API_KEY: ${{ secrets.COLACLOUD_API_KEY }}

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_id: ${{ steps.plan.outputs.run_id }}
      sources: ${{ steps.plan.outputs.sources }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - id: plan
        run: |
          OUT=$(npm run --silent plan -- \
            --source="${{ github.event.inputs.source || 'all' }}" \
            --mode="${{ github.event.inputs.mode || 'live' }}" \
            --run-id="${{ github.event.inputs.run_id }}")
          echo "$OUT" | jq -e . >/dev/null   # fail loudly if plan didn't emit JSON
          echo "run_id=$(echo "$OUT" | jq -r '.run_id')" >> "$GITHUB_OUTPUT"
          echo "sources=$(echo "$OUT" | jq -c '.sources')" >> "$GITHUB_OUTPUT"

  gather:
    needs: plan
    # Skip cleanly when nothing is enabled (empty matrix would otherwise error).
    if: ${{ needs.plan.outputs.sources != '' && needs.plan.outputs.sources != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false   # one bad source must not cancel its siblings
      matrix:
        source: ${{ fromJSON(needs.plan.outputs.sources) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run --silent gather -- --run-id="${{ needs.plan.outputs.run_id }}" --source="${{ matrix.source }}"

  aggregate:
    needs: [plan, gather]
    # Always run the overseer — even if some (or all) gather jobs failed — so
    # partial results are still de-duped and written, and the run is finalized.
    if: ${{ always() && needs.plan.outputs.run_id != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run --silent aggregate -- --run-id="${{ needs.plan.outputs.run_id }}"
